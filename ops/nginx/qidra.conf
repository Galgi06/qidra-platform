limit_req_zone $binary_remote_addr zone=qidra_auth:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=qidra_sensitive_api:10m rate=60r/m;
limit_req_status 429;

server {
  listen 80;
  server_name qidra.io www.qidra.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name qidra.io www.qidra.io;

  client_max_body_size 110m;

  ssl_certificate /etc/letsencrypt/live/qidra.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/qidra.io/privkey.pem;

  location ^~ /api/auth/ {
    limit_req zone=qidra_auth burst=30 nodelay;
    include /etc/nginx/snippets/qidra-proxy.conf;
  }

  location = /api/investments {
    limit_req zone=qidra_sensitive_api burst=60 nodelay;
    include /etc/nginx/snippets/qidra-proxy.conf;
  }

  location ^~ /api/investments/ {
    limit_req zone=qidra_sensitive_api burst=60 nodelay;
    include /etc/nginx/snippets/qidra-proxy.conf;
  }

  location ^~ /api/wallet/ {
    limit_req zone=qidra_sensitive_api burst=60 nodelay;
    include /etc/nginx/snippets/qidra-proxy.conf;
  }

  location ^~ /api/support/ {
    limit_req zone=qidra_sensitive_api burst=60 nodelay;
    include /etc/nginx/snippets/qidra-proxy.conf;
  }

  location / {
    include /etc/nginx/snippets/qidra-proxy.conf;
  }
}
