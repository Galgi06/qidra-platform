services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "8091"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8091/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    profiles:
      - tools
    env_file:
      - .env.production
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qidra}
      POSTGRES_USER: ${POSTGRES_USER:-qidra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the shell before starting compose}
    volumes:
      - qidra-postgres16-data:/var/lib/postgresql/data
      - qidra-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qidra-postgres16-data:
  qidra-backups:
